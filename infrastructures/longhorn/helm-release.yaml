apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn
spec:
  interval: 10m
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn
      interval: 1h
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 1
