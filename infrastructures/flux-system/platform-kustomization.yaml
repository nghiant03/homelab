apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platforms
  namespace: flux-system
spec:
  interval: 10m
  path: ./platforms
  prune: true
  dependsOn:
    - name: flux-system
  sourceRef:
    kind: GitRepository
    name: infrastructures
  decryption:
    provider: sops
    secretRef:
      name: sops-age
