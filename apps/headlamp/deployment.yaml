kind: Deployment
apiVersion: apps/v1
metadata:
  name: headlamp
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
     app.kubernetes.io/name: headlamp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headlamp
    spec:
      serviceAccountName: headlamp-operator

      initContainers:
        - name: headlamp-flux-plugin-install
          image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              mkdir -p /headlamp/plugins
              rm -rf /headlamp/plugins/flux
              cp -r /plugins/flux /headlamp/plugins/
          volumeMounts:
            - name: headlamp-plugins
              mountPath: /headlamp/plugins

        - name: headlamp-trivy-plugin-install
          image: ghcr.io/kubebeam/trivy-headlamp-plugin:latest
          command:
            - /bin/sh
            - -c
          args: 
            - |
              mkdir -p /headlamp/plugins
              cp -r /plugins/* /headlamp/plugins/
          volumeMounts:
            - name: headlamp-plugins
              mountPath: /headlamp/plugins

      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:latest
          args:
            - "-in-cluster"
            - "-plugins-dir=/headlamp/plugins"
          env:
            - name: HEADLAMP_CONFIG_TRACING_ENABLED
              value: "true"
            - name: HEADLAMP_CONFIG_METRICS_ENABLED
              value: "true"
            - name: HEADLAMP_CONFIG_OTLP_ENDPOINT
              value: "otel-collector:4317"
            - name: HEADLAMP_CONFIG_SERVICE_NAME
              value: "headlamp"
            - name: HEADLAMP_CONFIG_SERVICE_VERSION
              value: "latest"
          ports:
            - containerPort: 4466
              name: http
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /
              port: 4466
            initialDelaySeconds: 30
            timeoutSeconds: 30
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /
              port: 4466
            initialDelaySeconds: 30
            timeoutSeconds: 30
          volumeMounts:
            - mountPath: /headlamp/plugins
              name: headlamp-plugins

      volumes:
        - name: headlamp-plugins
          emptyDir: {}
      nodeSelector:
        'kubernetes.io/os': linux
