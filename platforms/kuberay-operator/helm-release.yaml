apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuberay-operator
  namespace: kuberay-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kuberay-operator
      version: "1.6.1"
      sourceRef:
        kind: HelmRepository
        name: kuberay
        namespace: kuberay-system
      interval: 12h

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    singleNamespaceInstall: false
