apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea-tailscale
  namespace: gitea
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - gitea
  rules:
    - host: gitea
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitea-http
                port:
                  number: 3000
