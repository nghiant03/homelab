apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy
spec:
  interval: 30m
  chart:
    spec:
      chart: trivy-operator
      version: "0.32.1"
      sourceRef:
        kind: HelmRepository
        name: aqua
        namespace: trivy
      interval: 24h

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    operator:
      scanJobTimeout: 10m
      vulnerabilityScannerScanOnlyCurrentRevisions: true
      configAuditScannerScanOnlyCurrentRevisions: true

    trivy:
      ignoreUnfixed: true
      severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

    serviceMonitor:
      enabled: false
