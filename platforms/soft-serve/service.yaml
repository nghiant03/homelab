apiVersion: v1
kind: Service
metadata:
  name: soft-serve
  namespace: git
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: soft-serve
  ports:
    - name: ssh
      port: 23231
      targetPort: ssh
    - name: http
      port: 23232
      targetPort: http
    - name: stats
      port: 23233
      targetPort: stats
    - name: git
      port: 9418
      targetPort: git
---
apiVersion: v1
kind: Service
metadata:
  name: soft-serve-tailnet
  namespace: git
  annotations:
    tailscale.com/hostname: soft-serve
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: soft-serve
  ports:
    - name: ssh
      port: 23231
      targetPort: 23231
      protocol: TCP
