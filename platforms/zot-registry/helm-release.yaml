apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot-registry
  namespace: zot-registry
spec:
  interval: 30m
  chart:
    spec:
      chart: zot
      version: "0.1.112"
      sourceRef:
        kind: HelmRepository
        name: zot-registry
        namespace: zot-registry
      interval: 24h

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    replicaCount: 1

    strategy:
      type: Recreate

    service:
      type: ClusterIP
      port: 5000

    persistence: true
    pvc:
      create: true
      storage: 50Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: local-path

    mountConfig: true
    configFiles:
      config.json: |
        {
          "distSpecVersion": "1.1.1",
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "commit": true,
            "dedupe": true,
            "gc": true,
            "gcDelay": "1h",
            "gcInterval": "24h"
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000"
          },
          "log": {
            "level": "info"
          },
          "extensions": {
            "search": {
              "enable": true
            },
            "ui": {
              "enable": true
            },
            "scrub": {
              "enable": true,
              "interval": "24h"
            }
          }
        }
